version = "2"

[run]
go = '1.23'

[linters]
enable = [
  'bodyclose',
  'dupl',
  'funlen',
  'gocritic',
  'gocyclo',
  'gosec',
  'misspell',
  'unconvert',
  'unparam',
    "revive"
]

[linters.settings]
[linters.settings.funlen]
lines = 120
statements = 70

[linters.settings.gocyclo]
min-complexity = 15

[linters.settings.revive]
[[linters.settings.revive.rules]]
name = "file-length-limit"

[[linters.settings.revive.rules.arguments]]
max = 1500
skip-comments = false
skip-blank-lines = false
[linters.exclusions]
generated = 'lax'
paths = [
  'third_party$',
  'builtin$',
  'examples$'
]

[[linters.exclusions.rules]]
linters = [
  'funlen'
]
path = 'cmd/.*\.go'

[[linters.exclusions.rules]]
linters = [
  'gocyclo'
]
path = 'main\.go'

[[linters.exclusions.rules]]
linters = [
  'unparam',
  'unused'
]
path = '.*_test\.go'

[severity]
default = 'error'

[formatters]
[formatters.settings]
[formatters.settings.goimports]
local-prefixes = [
  'github.com/your-org/labours-go'
]

[formatters.exclusions]
generated = 'lax'
paths = [
  'third_party$',
  'builtin$',
  'examples$'
]
